<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Boot 홈</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
        }
        .message {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-primary {
            background: #007bff;
            color: white;
        }
        .btn-primary:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #545b62;
            transform: translateY(-2px);
        }
        .api-info {
            margin-top: 2rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 5px;
            text-align: left;
        }
        .api-info h3 {
            margin-top: 0;
            color: #495057;
        }
        .api-endpoint {
            font-family: 'Courier New', monospace;
            background: #e9ecef;
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            margin: 0.25rem 0;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Spring Boot 서버</h1>
        <p class="message" th:text="${message}">서버가 정상적으로 실행 중입니다!</p>
        
        <div class="btn-group">
            <a href="/login" class="btn btn-primary">로그인</a>
            <a href="/signup" class="btn btn-secondary">회원가입</a>
        </div>

        <div class="api-info">
            <h3>📡 API 엔드포인트</h3>
            <span class="api-endpoint">POST /api/member/signup</span>
            <span class="api-endpoint">POST /api/member/login</span>
            <span class="api-endpoint">GET /api/member/me (JWT 필요)</span>
            <span class="api-endpoint">PUT /api/member/me (JWT 필요)</span>
        </div>
    </div>
</body>
</html>
