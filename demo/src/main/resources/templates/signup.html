<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: bold;
        }
        input[type="text"], input[type="password"], input[type="email"], input[type="date"], select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }
        input[type="text"]:focus, input[type="password"]:focus, input[type="email"]:focus, input[type="date"]:focus, select:focus {
            outline: none;
            border-color: #007bff;
        }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background: #218838;
        }
        .error {
            color: #dc3545;
            text-align: center;
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 5px;
        }
        .form-row {
            display: flex;
            gap: 1rem;
        }
        .form-row .form-group {
            flex: 1;
        }
        .links {
            text-align: center;
            margin-top: 1rem;
        }
        .links a {
            color: #007bff;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .help-text {
            font-size: 0.875rem;
            color: #6c757d;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 회원가입</h1>
        
        <div th:if="${error}" class="error" th:text="${error}"></div>
        
        <form th:action="@{/signup}" th:object="${memberDtoRequest}" method="post">
            <div class="form-group">
                <label for="loginId">아이디 *</label>
                <input type="text" id="loginId" th:field="*{_loginId}" required>
                <div class="help-text">영문, 숫자 조합으로 입력해주세요.</div>
            </div>
            
            <div class="form-group">
                <label for="password">비밀번호 *</label>
                <input type="password" id="password" th:field="*{_password}" required>
                <div class="help-text">영문, 숫자, 특수문자를 포함한 8~20자리로 입력해주세요.</div>
            </div>
            
            <div class="form-group">
                <label for="name">이름 *</label>
                <input type="text" id="name" th:field="*{_name}" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="birthDate">생년월일 *</label>
                    <input type="date" id="birthDate" th:field="*{_birthDate}" required>
                </div>
                
                <div class="form-group">
                    <label for="gender">성별 *</label>
                    <select id="gender" th:field="*{_gender}" required>
                        <option value="">선택하세요</option>
                        <option value="MAN">남성</option>
                        <option value="WOMAN">여성</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">이메일 *</label>
                <input type="email" id="email" th:field="*{_email}" required>
            </div>
            
            <button type="submit" class="btn">회원가입</button>
        </form>
        
        <div class="links">
            <a href="/login">로그인</a> | 
            <a href="/">홈으로</a>
        </div>
    </div>
</body>
</html>
