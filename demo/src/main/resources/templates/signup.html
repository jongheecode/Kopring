<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>
<body>
<div class="container">
    <h1>📝 회원가입</h1>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form th:action="@{/signup}" th:object="${memberDtoRequest}" method="post">
        <div class="form-group">
            <label for="loginId">아이디 *</label>
            <input type="text" id="loginId" th:field="*{loginId}" required>
            <div class="help-text">영문, 숫자 조합으로 입력해주세요.</div>
        </div>

        <div class="form-group">
            <label for="password">비밀번호 *</label>
            <input type="password" id="password" th:field="*{password}" required>
            <div class="help-text">영문, 숫자, 특수문자를 포함한 8~20자리로 입력해주세요.</div>
        </div>

        <div class="form-group">
            <label for="name">이름 *</label>
            <input type="text" id="name" th:field="*{name}" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="birthDate">생년월일 *</label>
                <input type="date" id="birthDate" th:field="*{birthDate}" required>
            </div>

            <div class="form-group">
                <label for="gender">성별 *</label>
                <select id="gender" th:field="*{gender}" required>
                    <option value="">선택하세요</option>
                    <option value="MAN">남성</option>
                    <option value="WOMAN">여성</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="email">이메일 *</label>
            <input type="email" id="email" th:field="*{email}" required>
        </div>

        <button type="submit" class="btn">회원가입</button>
    </form>

    <div class="links">
        <a href="/login">로그인</a> |
        <a href="/">홈으로</a>
    </div>
</div>
</body>
</html>
